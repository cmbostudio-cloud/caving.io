<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <title>caving.io</title>

  <!-- index.html 캐시 방지 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="stylesheet" href="style.css" data-cache-bust="true">

  <script>
    (function () {
      const VERSION = Date.now().toString();
      const appendVersion = (url) => {
        if (!url) return url;
        const hasQuery = url.includes('?');
        return `${url}${hasQuery ? '&' : '?'}v=${VERSION}`;
      };

      // CSS 캐시 버스팅
      document.querySelectorAll('link[rel="stylesheet"][data-cache-bust="true"]').forEach((link) => {
        link.href = appendVersion(link.getAttribute('href'));
      });

      // 전역으로 노출하여 JS 로더/기타 로직에서 재사용
      window.__ASSET_VERSION__ = VERSION;
      window.__appendVersion__ = appendVersion;
    })();
  </script>
</head>

<body>

  <div id="overlay">
    <div id="overlay-box" class="splash">
      <h2>caving.io</h2>
      <div class="loading-label" data-i18n="loading">LOADING</div>
      <div class="loading-bar">
        <div class="loading-fill"></div>
      </div>
    </div>
  </div>


  <!-- Settings Overlay (game.js의 toggleSettings()가 참조) -->
  <div id="settings-overlay" hidden>
    <div id="settings-panel" class="panel" style="width:min(420px,94vw)">
      <div class="modal-head">
        <div class="panel-title" data-i18n="settings">SETTINGS</div>
        <button class="modal-close" type="button" onclick="toggleSettings(false)">✕</button>
      </div>
      <div class="settings-row">
        <span class="settings-label" data-i18n="layout">LAYOUT</span>
        <div class="segmented" role="group" aria-label="Layout mode">
          <button type="button" data-layout-option="classic" data-i18n="classic"
            onclick="setLayoutMode('classic')">CLASSIC</button>
          <button type="button" data-layout-option="square" data-i18n="square"
            onclick="setLayoutMode('square')">SQUARE</button>
        </div>
      </div>
      <div class="settings-row">
        <span class="settings-label" data-i18n="language">LANGUAGE</span>
        <div class="segmented" role="group" aria-label="Language">
          <button type="button" data-lang-option="en" onclick="setLanguage('en')">EN</button>
          <button type="button" data-lang-option="ko" onclick="setLanguage('ko')">KO</button>
        </div>
      </div>
      <div class="settings-row">
        <span class="settings-label" data-i18n="theme">THEME</span>
        <div class="segmented" role="group" aria-label="Theme">
          <button type="button" data-theme-option="dark" data-i18n="dark" onclick="setThemeMode('dark')">DARK</button>
          <button type="button" data-theme-option="light" data-i18n="light" onclick="setThemeMode('light')">LIGHT</button>
        </div>
      </div>
      <div class="settings-row">
        <span class="settings-label" data-i18n="saveLoad">SAVE/LOAD</span>
        <div class="segmented" role="group" aria-label="Save and load">
          <button type="button" data-i18n="saveButton" onclick="manualSave()">SAVE (K)</button>
          <button type="button" data-i18n="loadButton" onclick="manualLoad()">LOAD (L)</button>
        </div>
      </div>
      <div class="settings-row">
        <span class="settings-label" data-i18n="miniMap">MINIMAP</span>
        <div class="segmented" role="group" aria-label="Minimap">
          <button type="button" data-minimap-option="on" data-i18n="on" onclick="setMinimapEnabled(true)">ON</button>
          <button type="button" data-minimap-option="off" data-i18n="off" onclick="setMinimapEnabled(false)">OFF</button>
        </div>
      </div>
    </div>
  </div>

  <div id="crafting-overlay" hidden>
    <div id="crafting-window">
      <div class="modal-head crafting-head">
        <div class="panel-title" data-i18n="upgrades">UPGRADES</div>
        <button class="modal-close" type="button" onclick="toggleCrafting(false)">✕</button>
      </div>
      <div class="crafting-list">
        <button class="crafting-btn" type="button" onclick="craftPickaxe('damage')" data-upgrade="damage">DMG UP (100G)</button>
        <button class="crafting-btn" type="button" onclick="craftPickaxe('gold_mult')" data-upgrade="gold_mult">GOLD UP (180G)</button>
        <button class="crafting-btn" type="button" onclick="craftPickaxe('attack_speed')" data-upgrade="attack_speed">ASPD UP (150G)</button>
      </div>
    </div>
  </div>

  <div id="shop-overlay" hidden>
    <div id="shop-window">
      <div class="modal-head crafting-head">
        <div class="panel-title">SHOP</div>
        <button class="modal-close" type="button" onclick="toggleShop(false)">✕</button>
      </div>
      <div class="shop-empty">EMPTY</div>
    </div>
  </div>

  <div id="main-layout">

    <div class="panel" id="map-panel">
      <div id="map-title" hidden aria-hidden="true"></div>
      <div id="map-canvas"></div>
      <canvas id="mini-map" width="88" height="88" aria-label="Mini map"></canvas>
      <button id="return-link" type="button" data-i18n="return" onclick="tryReturn()">RETURN (R)</button>

      <div id="alloc-panel" class="hud-box">
        <button id="alloc-toggle" class="text-toggle" type="button" onclick="toggleStatPoints()" aria-expanded="true"><span class="toggle-label">STAT POINTS ▾</span><span class="toggle-value">0</span></button>
        <div id="stat-alloc-list" class="open">
          <div class="alloc-row"><span>DMG</span><button type="button" class="alloc-plus" onclick="allocateStat('damage')">[+]</button></div>
          <div class="alloc-row"><span>SPD</span><button type="button" class="alloc-plus" onclick="allocateStat('attack_speed')">[+]</button></div>
          <div class="alloc-row"><span>GLD</span><button type="button" class="alloc-plus" onclick="allocateStat('gold_mult')">[+]</button></div>
        </div>
      </div>

      <div id="stats-panel" hidden aria-hidden="true"><div id="selection-info"></div></div>

      <div id="status-panel">
        <button id="status-toggle" class="text-toggle" type="button" onclick="toggleStatusPanel()" aria-expanded="true">STATUS ▾</button>
        <div id="core-status-row" class="open">
          <div class="status-item">
            <div class="status-head"><span data-i18n="hp">HP</span><span id="hp-val">100 / 100</span></div>
            <div class="bar-wrap"><div class="bar-fill bar-hp" id="hp-bar" style="width:100%"></div></div>
          </div>
          <div class="status-item">
            <div class="status-head"><span data-i18n="stamina">STAMINA</span><span id="stam-val">100 / 100</span></div>
            <div class="bar-wrap"><div class="bar-fill bar-stam" id="stam-bar" style="width:100%"></div></div>
          </div>
          <div class="status-item">
            <div class="status-head"><span data-i18n="exp">EXP</span><span id="xp-val">0 / 100</span></div>
            <div class="bar-wrap"><div class="bar-fill bar-xp" id="xp-bar" style="width:0%"></div></div>
          </div>
        </div>
        <div id="meta-stack" class="open">
          <div class="meta-row"><span data-i18n="level">LEVEL</span><span id="lv-val">1</span></div>
          <div class="meta-row"><span data-i18n="power">POWER</span><span id="pick-val">Wood Lv.1</span></div>
          <div class="meta-row"><span data-i18n="area">AREA</span><span id="depth-val">FOREST</span></div>
          <div class="meta-row"><span data-i18n="gold">GOLD</span><span id="gold-val">0</span></div>
        </div>
      </div>
    </div>

  </div>

  <button id="settings-btn" class="floating-settings" type="button" onclick="toggleSettings()" aria-expanded="false" data-i18n="settings">SETTINGS</button>

  <script>
    (function () {
      const scripts = ['js/bootstrap.js', 'game.js', 'pwa.js'];

      function loadScriptsSequentially(list) {
        if (!list.length) return;
        const [current, ...rest] = list;
        const el = document.createElement('script');
        el.src = window.__appendVersion__(current);
        el.onload = () => loadScriptsSequentially(rest);
        document.body.appendChild(el);
      }

      loadScriptsSequentially(scripts);

      // 서비스 워커 즉시 업데이트 적용
      if ('serviceWorker' in navigator) {
        let refreshing = false;

        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });

        navigator.serviceWorker.getRegistration().then((registration) => {
          if (!registration) return;

          const requestSkipWaiting = (worker) => {
            if (!worker) return;
            worker.postMessage({ type: 'SKIP_WAITING' });
          };

          if (registration.waiting) {
            requestSkipWaiting(registration.waiting);
          }

          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            if (!newWorker) return;

            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                requestSkipWaiting(newWorker);
              }
            });
          });

          registration.update().catch(() => {
            // 네트워크 상황에 따라 update 실패 가능 (무시)
          });
        });
      }
    })();
  </script>
</body>

</html>
