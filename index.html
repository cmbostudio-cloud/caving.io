<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>caving.io</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="overlay">
    <div id="overlay-box" class="splash">
      <h2>caving.io</h2>
      <div class="loading-label" data-i18n="loading">LOADING</div>
      <div class="loading-bar">
        <div class="loading-fill"></div>
      </div>
    </div>
  </div>

  <div id="title-bar">
    <div class="title-text">caving<span>.io</span></div>
    <button id="settings-btn" type="button" onclick="toggleSettings()" aria-expanded="false">SET</button>
  </div>

  <!-- Settings Overlay (game.js의 toggleSettings()가 참조) -->
  <div id="settings-overlay" hidden>
    <div id="settings-panel" class="panel" style="width:min(420px,94vw)">
      <div class="modal-head">
        <div class="panel-title" data-i18n="settings">SETTINGS</div>
        <button class="modal-close" type="button" onclick="toggleSettings(false)">✕</button>
      </div>
      <div class="settings-row">
        <span class="settings-label" data-i18n="layout">LAYOUT</span>
        <div class="segmented" role="group" aria-label="Layout mode">
          <button type="button" data-layout-option="classic" data-i18n="classic"
            onclick="setLayoutMode('classic')">CLASSIC</button>
          <button type="button" data-layout-option="square" data-i18n="square"
            onclick="setLayoutMode('square')">SQUARE</button>
        </div>
      </div>
      <div class="settings-row">
        <span class="settings-label" data-i18n="language">LANGUAGE</span>
        <div class="segmented" role="group" aria-label="Language">
          <button type="button" data-lang-option="en" onclick="setLanguage('en')">EN</button>
          <button type="button" data-lang-option="ko" onclick="setLanguage('ko')">KO</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Inventory Overlay (game.js의 toggleInventory()가 참조) -->
  <div id="inventory-overlay" hidden>
    <div id="inventory-window">
      <div class="inventory-head">
        <div class="panel-title" data-i18n="inventory">INVENTORY</div>
        <button id="inventory-close" type="button" onclick="toggleInventory(false)">✕</button>
      </div>
      <div class="inventory-body">
        <div class="inventory-profile">
          <div class="player-card">
            <div class="player-avatar">
              <!-- 7x7 pixel avatar grid -->
              <span></span><span></span><span class="on"></span><span class="on"></span><span
                class="on"></span><span></span><span></span>
              <span></span><span class="on"></span><span></span><span></span><span></span><span
                class="on"></span><span></span>
              <span class="on"></span><span></span><span class="on"></span><span class="on"></span><span
                class="on"></span><span></span><span class="on"></span>
              <span class="on"></span><span></span><span class="on"></span><span></span><span
                class="on"></span><span></span><span class="on"></span>
              <span class="on"></span><span></span><span class="on"></span><span class="on"></span><span
                class="on"></span><span></span><span class="on"></span>
              <span></span><span class="on"></span><span></span><span></span><span></span><span
                class="on"></span><span></span>
              <span></span><span></span><span class="on"></span><span class="on"></span><span
                class="on"></span><span></span><span></span>
            </div>
          </div>
          <div class="inventory-stats">
            <div id="inventory-stats-list"></div>
          </div>
        </div>
        <div class="inventory-materials">
          <div id="inventory-card-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Exchange Overlay (game.js의 toggleExchange()가 참조) -->
  <div id="exchange-overlay" hidden>
    <div id="exchange-window">
      <div class="modal-head" style="padding:10px;border-bottom:1px solid var(--border)">
        <div class="panel-title" data-i18n="exchange">EXCHANGE</div>
        <button id="exchange-close" type="button" onclick="toggleExchange(false)">✕</button>
      </div>
      <div class="exchange-summary">
        <span data-i18n="gold">GOLD</span>
        <strong id="exchange-gold-val">0</strong>
      </div>
      <div id="exchange-list"></div>
    </div>
  </div>

  <div id="main-layout">

    <div class="panel" id="map-panel">
      <div class="panel-title" id="map-title">FOREST MAP</div>
      <div id="map-canvas"></div>
    </div>

    <div class="panel" id="stats-panel">
      <div class="panel-title" data-i18n="status">STATUS</div>

      <div class="stat-row">
        <span class="stat-label" data-i18n="hp">HP</span>
        <span class="stat-val" id="hp-val">100 / 100</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill bar-hp" id="hp-bar" style="width:100%"></div>
      </div>

      <div class="stat-row">
        <span class="stat-label" data-i18n="stamina">STAMINA</span>
        <span class="stat-val" id="stam-val">100 / 100</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill bar-stam" id="stam-bar" style="width:100%"></div>
      </div>

      <div class="stat-row">
        <span class="stat-label" data-i18n="exp">EXP</span>
        <span class="stat-val" id="xp-val">0 / 100</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill bar-xp" id="xp-bar" style="width:0%"></div>
      </div>

      <div class="stat-row" style="margin-top:4px">
        <span class="stat-label" data-i18n="level">LEVEL</span>
        <span class="stat-val" id="lv-val">1</span>
      </div>
      <div class="stat-row">
        <span class="stat-label" data-i18n="pickaxe">PICKAXE</span>
        <span class="stat-val" id="pick-val">Wood Lv.1</span>
      </div>
      <div class="stat-row">
        <span class="stat-label" data-i18n="area">AREA</span>
        <span class="stat-val" id="depth-val">FOREST</span>
      </div>
      <!-- gold-val: game.js의 render()가 참조 (원본 score-val 대신) -->
      <div class="stat-row">
        <span class="stat-label" data-i18n="gold">GOLD</span>
        <span class="stat-val" id="gold-val">0</span>
      </div>

      <div class="panel-title" style="margin-top:10px" data-i18n="inventory">INVENTORY</div>
      <div id="inv-list"></div>
    </div>

    <div class="panel" id="action-panel">
      <div class="panel-title" data-i18n="action">ACTION</div>
      <div id="selection-info">NO TILE SELECTED</div>
      <div class="action-grid">
        <button class="action-btn" type="button" data-i18n="return" onclick="tryReturn()">RETURN (R)</button>
        <button class="action-btn" type="button" data-i18n="inventoryButton" onclick="toggleInventory()">INVENTORY (I)</button>
        <button class="action-btn" type="button" data-i18n="saveButton" onclick="manualSave()">SAVE (K)</button>
        <button class="action-btn" type="button" data-i18n="loadButton" onclick="manualLoad()">LOAD (L)</button>
      </div>
    </div>

    <div class="panel" id="log-panel">
      <div class="panel-title" data-i18n="log">LOG</div>
      <div id="log-list"></div>
    </div>

  </div>

  <script src="game.js"></script>
</body>

</html>
