<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>caving.io</title>
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="overlay">
    <div id="overlay-box" class="splash">
      <h2>caving.io</h2>
      <div class="loading-label" data-i18n="loading">LOADING</div>
      <div class="loading-bar">
        <div class="loading-fill"></div>
      </div>
    </div>
  </div>

  <div id="title-bar">
    <div class="title-text">caving<span>.io</span></div>
    <div class="title-actions">
      <button id="install-btn" type="button" onclick="installGame()" hidden data-i18n="install">INSTALL</button>
      <button id="settings-btn" type="button" onclick="toggleSettings()" aria-expanded="false" data-i18n="settingsShort">SET</button>
    </div>
  </div>

  <!-- Settings Overlay (game.js의 toggleSettings()가 참조) -->
  <div id="settings-overlay" hidden>
    <div id="settings-panel" class="panel" style="width:min(420px,94vw)">
      <div class="modal-head">
        <div class="panel-title" data-i18n="settings">SETTINGS</div>
        <button class="modal-close" type="button" onclick="toggleSettings(false)">✕</button>
      </div>
      <div class="settings-row">
        <span class="settings-label" data-i18n="layout">LAYOUT</span>
        <div class="segmented" role="group" aria-label="Layout mode">
          <button type="button" data-layout-option="classic" data-i18n="classic"
            onclick="setLayoutMode('classic')">CLASSIC</button>
          <button type="button" data-layout-option="square" data-i18n="square"
            onclick="setLayoutMode('square')">SQUARE</button>
        </div>
      </div>
      <div class="settings-row">
        <span class="settings-label" data-i18n="language">LANGUAGE</span>
        <div class="segmented" role="group" aria-label="Language">
          <button type="button" data-lang-option="en" onclick="setLanguage('en')">EN</button>
          <button type="button" data-lang-option="ko" onclick="setLanguage('ko')">KO</button>
        </div>
      </div>
      <div class="settings-row">
        <span class="settings-label" data-i18n="saveLoad">SAVE/LOAD</span>
        <div class="segmented" role="group" aria-label="Save and load">
          <button type="button" data-i18n="saveButton" onclick="manualSave()">SAVE (K)</button>
          <button type="button" data-i18n="loadButton" onclick="manualLoad()">LOAD (L)</button>
        </div>
      </div>
    </div>
  </div>

  <div id="crafting-overlay" hidden>
    <div id="crafting-window">
      <div class="modal-head crafting-head">
        <div class="panel-title" data-i18n="upgrades">UPGRADES</div>
        <button class="modal-close" type="button" onclick="toggleCrafting(false)">✕</button>
      </div>
      <div class="crafting-list">
        <button class="crafting-btn" type="button" onclick="craftPickaxe('damage')" data-upgrade="damage">DMG UP (100G)</button>
        <button class="crafting-btn" type="button" onclick="craftPickaxe('gold_mult')" data-upgrade="gold_mult">GOLD UP (180G)</button>
        <button class="crafting-btn" type="button" onclick="craftPickaxe('attack_speed')" data-upgrade="attack_speed">ASPD UP (150G)</button>
      </div>
    </div>
  </div>

  <div id="main-layout">

    <div class="panel" id="map-panel">
      <div class="panel-title" id="map-title">FOREST MAP</div>
      <div id="map-canvas"></div>
    </div>

    <div class="panel" id="stats-panel">
      <div class="panel-title" data-i18n="status">STATUS</div>

      <div class="stat-row">
        <span class="stat-label" data-i18n="hp">HP</span>
        <span class="stat-val" id="hp-val">100 / 100</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill bar-hp" id="hp-bar" style="width:100%"></div>
      </div>

      <div class="stat-row">
        <span class="stat-label" data-i18n="stamina">STAMINA</span>
        <span class="stat-val" id="stam-val">100 / 100</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill bar-stam" id="stam-bar" style="width:100%"></div>
      </div>

      <div class="stat-row">
        <span class="stat-label" data-i18n="exp">EXP</span>
        <span class="stat-val" id="xp-val">0 / 100</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill bar-xp" id="xp-bar" style="width:0%"></div>
      </div>

      <div class="stat-row" style="margin-top:4px">
        <span class="stat-label" data-i18n="level">LEVEL</span>
        <span class="stat-val" id="lv-val">1</span>
      </div>
      <div class="stat-row">
        <span class="stat-label" data-i18n="power">POWER</span>
        <span class="stat-val" id="pick-val">Wood Lv.1</span>
      </div>
      <div class="stat-row">
        <span class="stat-label" data-i18n="area">AREA</span>
        <span class="stat-val" id="depth-val">FOREST</span>
      </div>
      <!-- gold-val: game.js의 render()가 참조 (원본 score-val 대신) -->
      <div class="stat-row">
        <span class="stat-label" data-i18n="gold">GOLD</span>
        <span class="stat-val" id="gold-val">0</span>
      </div>

    </div>

    <div class="panel" id="action-panel">
      <div class="panel-title" data-i18n="action">ACTION</div>
      <div id="selection-info">NO TILE SELECTED</div>
      <div class="action-grid">
        <button class="action-btn" type="button" data-i18n="return" onclick="tryReturn()">RETURN (R)</button>
        
      </div>
    </div>

    <div class="panel" id="alloc-panel">
      <div class="panel-title" data-i18n="statPoints">STAT POINTS</div>
      <div class="stat-row"><span class="stat-label" data-i18n="points">POINTS</span><span class="stat-val" id="stat-points-val">0</span></div>
      <div id="stat-alloc-list">
        <div class="alloc-row"><span data-i18n="statDamage">Damage Up</span><button type="button" class="alloc-plus" onclick="allocateStat('damage')">[+]</button></div>
        <div class="alloc-row"><span data-i18n="statAttackSpeed">Attack Speed Up</span><button type="button" class="alloc-plus" onclick="allocateStat('attack_speed')">[+]</button></div>
        <div class="alloc-row"><span data-i18n="statGoldMult">Gold Rate Up</span><button type="button" class="alloc-plus" onclick="allocateStat('gold_mult')">[+]</button></div>
      </div>
    </div>

  </div>

  <script src="game.js"></script>
  <script src="pwa.js"></script>
</body>

</html>
